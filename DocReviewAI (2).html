<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DocReview AI — Проверка проектной документации</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg:#F2EFEA;--surface:#FFF;--surface-alt:#F8F6F2;
  --border:#DED9D1;--border-lt:#EBE8E2;
  --text:#1A1A1A;--text-sec:#5F5A53;--text-ter:#9A948B;
  --accent:#C44425;--accent-soft:rgba(196,68,37,.07);
  --blue:#2E6BC6;--blue-soft:rgba(46,107,198,.06);
  --green:#24825A;--green-soft:rgba(36,130,90,.06);
  --amber:#B87314;--amber-soft:rgba(184,115,20,.06);
  --shadow:0 1px 3px rgba(0,0,0,.05),0 6px 20px rgba(0,0,0,.03);
  --shadow-lg:0 4px 12px rgba(0,0,0,.05),0 16px 40px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
input[type=file]{display:none}
button{font-family:inherit;cursor:pointer}
textarea{font-family:inherit}

/* Layout */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.topbar-left,.topbar-right{display:flex;align-items:center;gap:8px}
.logo{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--accent),#E06A3E);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff}
.brand{font-size:15px;font-weight:800;letter-spacing:-.03em}
.brand span{color:var(--accent)}
.badge{font-size:9px;color:var(--text-ter);font-family:'DM Mono',monospace;background:var(--surface-alt);padding:2px 6px;border-radius:4px;border:1px solid var(--border-lt)}
.sep{height:18px;width:1px;background:var(--border)}
.filename{font-size:12px;color:var(--text-ter);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Buttons */
.btn{padding:6px 12px;border-radius:7px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface-alt);color:var(--text-sec);transition:all .15s}
.btn:hover{border-color:var(--text-ter)}
.btn-accent{background:linear-gradient(135deg,var(--accent),#E06A3E);color:#fff;border:none;font-weight:700;padding:6px 16px}
.btn-accent:disabled{background:var(--border);color:var(--text-ter);cursor:default}
.btn-provider{font-family:'DM Mono',monospace;font-weight:700;font-size:11px;border-radius:7px;padding:5px 10px;display:flex;align-items:center;gap:4px}
.zoom-badge{display:flex;align-items:center;background:var(--surface-alt);border-radius:7px;padding:2px 6px;border:1px solid var(--border)}
.zoom-badge span{font-size:10px;color:var(--text-ter);font-family:'DM Mono',monospace;min-width:36px;text-align:center}

/* Stats */
.stats{display:flex;align-items:center;gap:10px;margin-right:4px}
.stat{display:flex;align-items:center;gap:3px}
.stat-dot{width:6px;height:6px;border-radius:50%}
.stat span{font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.stat-total{font-size:10px;color:var(--text-ter);font-family:'DM Mono',monospace}

/* Error bar */
.error-bar{background:var(--accent-soft);border-bottom:1px solid rgba(196,68,37,.2);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
.error-bar span{font-size:12px;color:var(--accent);font-weight:600}
.error-bar .actions{display:flex;gap:6px}

/* Body */
.body{display:flex;flex:1;overflow:hidden}

/* Sidebar */
.sidebar{width:210px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .3s}
.sidebar.collapsed{width:42px}
.sidebar-toggle{background:none;border:none;color:var(--text-sec);padding:11px 13px;text-align:left;font-size:13px;display:flex;align-items:center;gap:7px;border-bottom:1px solid var(--border-lt);width:100%}
.sidebar-toggle .arrow{font-size:13px;transition:transform .2s;display:inline-block}
.sidebar.collapsed .arrow{transform:rotate(180deg)}
.sidebar-content{padding:8px;flex:1;overflow:auto}
.ref-file{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--surface-alt);border-radius:6px;border:1px solid var(--border-lt);margin-bottom:4px;animation:fadeUp .3s}
.ref-file .name{font-size:10px;color:var(--text-sec);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ref-file .size{font-size:9px;color:var(--text-ter)}
.ref-file .remove{background:none;border:none;color:var(--text-ter);font-size:11px;padding:1px;flex-shrink:0}
.add-ref{width:100%;padding:8px 0;border-radius:6px;border:1px dashed var(--border);background:none;color:var(--text-ter);font-size:11px;margin-top:2px}
.ref-hint{font-size:9px;color:var(--text-ter);text-align:center;margin-top:6px;line-height:1.4}
.ref-status{font-size:9px;color:var(--green);padding:4px 0 6px;font-family:'DM Mono',monospace;text-align:center}

/* Viewer */
.viewer{flex:1;display:flex;flex-direction:column;overflow:hidden}
.viewer-scroll{flex:1;overflow:auto;position:relative;background:var(--bg)}
.pdf-wrap{padding:24px;display:flex;justify-content:center}
.pdf-container{position:relative;box-shadow:var(--shadow-lg);border-radius:4px;overflow:hidden;background:#fff;line-height:0}

/* Upload zone */
.upload-zone{flex:1;display:flex;align-items:center;justify-content:center}
.upload-box{display:flex;flex-direction:column;align-items:center;padding:44px;border:2px dashed var(--border);border-radius:16px;cursor:pointer;max-width:400px;width:100%;transition:border-color .2s}
.upload-box:hover{border-color:var(--accent)}
.upload-box.dragover{border-color:var(--accent);background:var(--accent-soft)}
.upload-icon{font-size:40px;margin-bottom:12px;opacity:.3}
.upload-title{font-size:16px;font-weight:700;margin-bottom:5px}
.upload-hint{font-size:12px;color:var(--text-ter);text-align:center;line-height:1.6;max-width:260px}
.upload-shortcut{margin-top:5px;font-size:10px;color:var(--text-ter);font-family:'DM Mono',monospace}
.upload-btn{margin-top:16px;padding:7px 20px;border-radius:8px;background:var(--accent-soft);color:var(--accent);font-size:12px;font-weight:600;border:1px solid rgba(196,68,37,.16)}

/* Spinner */
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}

/* Checking overlay */
.check-overlay{position:absolute;inset:0;background:rgba(242,239,234,.92);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:50;flex-direction:column}
.check-inner{width:340px;text-align:center}
.check-title{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:12px}
.check-title span:first-child{font-size:16px}
.check-title span:last-child{font-size:13px;font-weight:700}
.progress-bar{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;border-radius:2px;transition:width .4s}
.check-status{font-size:11px;color:var(--text-sec);font-weight:600;margin-bottom:8px}
.check-sub{font-size:10px;color:var(--text-ter);font-family:'DM Mono',monospace}
.page-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-bottom:10px}
.page-cell{width:36px;height:28px;border-radius:5px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;font-family:'DM Mono',monospace;transition:all .3s;border:1px solid var(--border-lt);background:var(--surface-alt)}
.page-cell.analyzing{border-color:rgba(46,107,198,.3);background:rgba(46,107,198,.06)}
.page-cell.done{border-color:rgba(36,130,90,.3);background:rgba(36,130,90,.06)}
.page-cell.error{border-color:rgba(196,68,37,.3);background:var(--accent-soft)}

/* Pin */
.pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:z-index 0s}
.pin.active{z-index:100}
.pin-pulse{position:absolute;top:50%;left:50%;width:42px;height:42px;border-radius:50%;opacity:.4;transform:translate(-50%,-50%);animation:pinPulse 1.6s ease-in-out infinite}
.pin-dot{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-family:'DM Mono',monospace;transition:all .3s cubic-bezier(.34,1.56,.64,1)}

/* Pagination */
.pagination{height:44px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;gap:6px;background:var(--surface);flex-shrink:0}
.pg-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text-sec);font-size:12px;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace}
.pg-btn.current{background:var(--accent);color:#fff;border:none;font-weight:700}
.pg-ellipsis{font-size:10px;color:var(--text-ter)}

/* Comments panel */
.comments{width:340px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.comments-header{padding:12px 14px;border-bottom:1px solid var(--border-lt);display:flex;align-items:center;justify-content:space-between}
.comments-header .title{font-size:13px;font-weight:700}
.comments-header .count{font-size:10px;color:var(--text-ter);font-family:'DM Mono',monospace}
.comments-scroll{flex:1;overflow:auto;padding:10px}
.comments-empty{text-align:center;padding:28px;color:var(--text-ter);font-size:12px}

/* Comment card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px;transition:all .25s;cursor:pointer;scroll-margin-top:8px;animation:fadeUp .3s}
.card.active{background:var(--surface-alt);padding:16px}
.card.resolved{opacity:.5;cursor:default}
.card-header{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.card-sev{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:10px;font-weight:800}
.card-sev-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace}
.card-provider{font-size:9px;color:var(--text-ter);margin-left:auto;font-family:'DM Mono',monospace;background:var(--surface-alt);padding:1px 5px;border-radius:3px;border:1px solid var(--border-lt)}
.card-title{font-size:13px;font-weight:700;line-height:1.45;margin-bottom:8px}
.card-text{font-size:12px;color:var(--text-sec);line-height:1.7;margin-bottom:14px;white-space:pre-line}
.card-reply{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--text);resize:vertical;outline:none;line-height:1.6;margin-bottom:10px}
.card-actions{display:flex;gap:6px}
.card-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:5px;padding:7px 10px;border-radius:7px;font-size:11.5px;font-weight:600;transition:all .15s}
.card-btn-accept{background:var(--green-soft);color:var(--green);border:1px solid rgba(36,130,90,.13)}
.card-btn-reject{background:var(--accent-soft);color:var(--accent);border:1px solid rgba(196,68,37,.13)}
.card-resolved{display:flex;align-items:center;gap:6px}
.card-resolved-icon{font-weight:700;font-size:15px}
.card-resolved-text{font-size:12px;color:var(--text-sec)}
.card-resolved-title{font-size:12px;color:var(--text-ter);margin-top:4px}
.card-resolved-reply{font-size:11px;color:var(--text-ter);margin-top:6px;font-style:italic;line-height:1.5}

/* Progress footer */
.progress-footer{padding:9px 14px;border-top:1px solid var(--border-lt);background:var(--surface-alt)}
.progress-footer-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:5px}
.progress-footer-fill{height:100%;background:var(--green);border-radius:2px;transition:width .4s}
.progress-footer-text{font-size:10px;color:var(--text-ter);text-align:center}

/* Settings modal */
.modal-bg{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2);backdrop-filter:blur(4px)}
.modal{width:540px;max-height:85vh;background:var(--surface);border-radius:14px;box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:15px;font-weight:800}
.modal-head p{font-size:11px;color:var(--text-ter);margin-top:2px}
.modal-close{background:none;border:none;color:var(--text-ter);font-size:18px}
.modal-body{flex:1;overflow:auto;padding:20px}
.modal-foot{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* Provider selector */
.prov-grid{display:flex;gap:6px;margin-bottom:20px}
.prov-card{flex:1;padding:10px 8px;border-radius:8px;text-align:center;transition:all .2s;border:2px solid var(--border-lt);background:var(--surface-alt)}
.prov-card.selected{border-color:currentColor}
.prov-card .icon{font-size:18px}
.prov-card .name{font-size:11px;font-weight:700;margin-top:3px}
.prov-card .free{font-size:9px;color:var(--green);margin-top:2px}

/* Key section */
.key-section{margin-bottom:14px;padding:12px;background:var(--surface-alt);border-radius:10px;border:1px solid var(--border-lt)}
.key-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.key-header-left{display:flex;align-items:center;gap:6px}
.key-header-left .icon{font-size:15px}
.key-header-left .name{font-size:12px;font-weight:700}
.key-header-left .desc{font-size:10px;color:var(--text-ter)}
.key-add{padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;border:1px solid}
.key-empty{font-size:10px;color:var(--text-ter);padding:6px 0;text-align:center}
.key-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;padding:5px 7px;background:var(--surface);border-radius:6px;border:1px solid var(--border-lt)}
.key-toggle{width:16px;height:16px;border-radius:3px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;font-weight:800;flex-shrink:0}
.key-toggle.on{border-color:currentColor;background:currentColor}
.key-label{width:70px;background:none;border:none;outline:none;font-size:10px;font-weight:600;color:var(--text)}
.key-input{flex:1;background:var(--surface-alt);border:1px solid var(--border-lt);border-radius:4px;padding:3px 6px;font-size:10px;color:var(--text);outline:none;font-family:'DM Mono',monospace}
.key-remove{background:none;border:none;color:var(--text-ter);font-size:12px;padding:1px;flex-shrink:0}

/* Info box */
.info-box{padding:12px;border-radius:8px;margin-bottom:16px}
.info-box h4{font-size:12px;font-weight:600;margin-bottom:4px}
.info-box p{font-size:11px;color:var(--text-sec);line-height:1.5}

/* Section label */
.section-label{font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}

/* Animations */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes pinPulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.4}50%{transform:translate(-50%,-50%) scale(1.7);opacity:0}}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
// ══════════ CONFIG & STATE ══════════
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const PROVIDERS = {
  gemini:{ name:'Gemini', icon:'🔵', color:'#3B82F6', desc:'Google Gemini 2.5 Flash — нативный PDF', needsKey:true, recommended:true },
  claude:{ name:'Claude', icon:'🟠', color:'#D97706', desc:'Anthropic Claude Sonnet 4', needsKey:true },
  gpt:{ name:'GPT', icon:'🟢', color:'#10B981', desc:'OpenAI GPT-4o Vision', needsKey:true },
};

const SYSTEM_PROMPT = `You are an expert engineering document reviewer. You specialize in international standards: IEC, IEEE, ISO.

CRITICAL INSTRUCTIONS:
- Focus on TECHNICAL issues: incorrect parameters, wrong connections, missing calculations, standard violations
- DO NOT comment on title blocks, stamps, formatting, font sizes, line weights, or general document formatting
- DO NOT comment on missing signatures, dates, or administrative fields
- For electrical schematics: check connections, component designations (IEC 61346/81346), protection coordination, voltage levels (IEC 60038), short-circuit requirements (IEC 60909)
- For floor plans: check fire safety (widths, exits), structural clearances
- For sections/details: check dimensions, material specs, reinforcement

For each issue found, return a JSON array:
[{"severity":"error|warning|info","title":"Standard Ref: Brief title","text":"Detailed description:\\n\\nWhat is wrong:\\n...\\n\\nRequired by standard:\\n...\\n\\nHow to fix:\\n...","x":0-100,"y":0-100}]

x,y = approximate percentage position on the page where the issue is.
Return ONLY valid JSON array. No markdown fences. Respond in Russian.
If no technical issues found, return [].`;

let state = {
  pdfDoc: null, pdfName: '', totalPages: 0, page: 1, zoom: 100,
  refFiles: [], // File objects
  comments: [], showComments: false, activeComment: null,
  checking: false, progress: 0, status: '', pageStatuses: {},
  error: '',
  showSettings: false,
  config: {
    active: 'gemini',
    keys: { gemini:[], claude:[], gpt:[] }
  }
};

// ══════════ HELPERS ══════════
function getKeys(prov) {
  return (state.config.keys[prov]||[]).filter(k=>k.active&&k.key.trim());
}
function getKey(prov) {
  const ks = getKeys(prov);
  return ks.length ? ks[Math.floor(Math.random()*ks.length)].key : null;
}

async function pageToBase64(doc, num) {
  const pg = await doc.getPage(num);
  const vp = pg.getViewport({scale:1.2});
  const cv = document.createElement('canvas');
  cv.width=vp.width; cv.height=vp.height;
  await pg.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
  return cv.toDataURL('image/jpeg',0.6).split(',')[1];
}

async function pdfToBase64(file) {
  return new Promise(res=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.readAsDataURL(file);
  });
}

async function readRefFiles() {
  let ctx = '';
  for (const file of state.refFiles) {
    const isText = /\.(txt|csv|md|json|xml|html?)$/i.test(file.name);
    const isPdf = /\.pdf$/i.test(file.name);
    if (isText) {
      const text = await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result);fr.onerror=()=>r('');fr.readAsText(file)});
      ctx += '\n--- '+file.name+' ---\n' + text.slice(0,8000) + '\n';
    } else if (isPdf) {
      try {
        const buf = await file.arrayBuffer();
        const doc = await pdfjsLib.getDocument({data:buf}).promise;
        let t='';
        for(let p=1;p<=Math.min(doc.numPages,5);p++){
          const pg=await doc.getPage(p);
          const tc=await pg.getTextContent();
          t+=tc.items.map(i=>i.str).join(' ')+'\n';
        }
        ctx += '\n--- '+file.name+' ('+doc.numPages+' стр) ---\n' + t.slice(0,8000) + '\n';
      } catch(e) {
        ctx += '\n--- '+file.name+' --- [не удалось прочитать]\n';
      }
    }
  }
  return ctx ? '\n\n=== СПРАВОЧНЫЕ ДОКУМЕНТЫ ===\n' + ctx : '';
}

function safeParseJson(text) {
  // Step 1: strip markdown fences
  let s = text.replace(/`{1,3}json\s*/gi,'').replace(/`{1,3}\s*$/gm,'').trim();
  // Step 2: extract array
  const first = s.indexOf('['), last = s.lastIndexOf(']');
  if (first >= 0 && last > first) s = s.slice(first, last + 1);
  else return [];

  // Step 3: try direct parse
  try { return JSON.parse(s); } catch(e) {}

  // Step 4: fix control characters inside JSON string values
  // Walk char by char, track if inside a string
  let out = '';
  let inStr = false;
  let esc = false;
  for (let i = 0; i < s.length; i++) {
    const c = s[i];
    const code = s.charCodeAt(i);
    if (esc) {
      out += c;
      esc = false;
      continue;
    }
    if (c === '\\' && inStr) {
      esc = true;
      out += c;
      continue;
    }
    if (c === '"') {
      inStr = !inStr;
      out += c;
      continue;
    }
    if (inStr && code < 32) {
      // Replace control chars with escape sequences
      if (c === '\n') out += '\\n';
      else if (c === '\r') out += '\\r';
      else if (c === '\t') out += '\\t';
      // else skip
      continue;
    }
    out += c;
  }

  // Step 5: try parse fixed string
  try { return JSON.parse(out); } catch(e2) {}

  // Step 6: last resort — try to eval as JS (handles single quotes etc)
  try {
    const fn = new Function('return ' + out);
    const result = fn();
    if (Array.isArray(result)) return result;
  } catch(e3) {}

  console.error('JSON parse failed. First 300 chars:', s.slice(0, 300));
  return [];
}

// ══════════ API CALLS ══════════

async function callGeminiNativePdf(pdfFile, systemPrompt, apiKey) {
  // Send entire PDF as native document — one request for whole document
  const pdfB64 = await pdfToBase64(pdfFile);
  const resp = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+apiKey, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      systemInstruction:{parts:[{text:systemPrompt}]},
      contents:[{parts:[
        {inlineData:{mimeType:'application/pdf',data:pdfB64}},
        {text:'Проанализируй ВСЮ проектную документацию целиком. Для КАЖДОЙ страницы с чертежами найди технические несоответствия стандартам IEC, IEEE, ISO. Игнорируй титульные листы и содержание. В поле "page" укажи номер страницы. Верни JSON массив.'}
      ]}],
      generationConfig:{maxOutputTokens:8000,temperature:0.2},
    }),
  });
  if (!resp.ok) { const e=await resp.text(); throw new Error('Gemini '+resp.status+': '+e.slice(0,200)); }
  const data = await resp.json();
  const text = data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'[]';
  return safeParseJson(text);
}

async function callClaudePage(base64, systemPrompt, apiKey) {
  const headers = {'Content-Type':'application/json'};
  if (apiKey) headers['x-api-key'] = apiKey;
  const resp = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers,
    body:JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:4000,
      system:systemPrompt,
      messages:[{role:'user',content:[
        {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64}},
        {type:'text',text:'Проанализируй этот лист. Найди ТЕХНИЧЕСКИЕ несоответствия стандартам IEC, IEEE, ISO. Игнорируй оформление и штампы.'}
      ]}],
    }),
  });
  if (!resp.ok) { const e=await resp.text(); throw new Error('Claude '+resp.status+': '+e.slice(0,200)); }
  const data = await resp.json();
  const text = (data.content||[]).map(b=>b.text||'').join('');
  return safeParseJson(text);
}

async function callGPTPage(base64, systemPrompt, apiKey) {
  const resp = await fetch('https://api.openai.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({
      model:'gpt-4o',max_tokens:4000,
      messages:[
        {role:'system',content:systemPrompt},
        {role:'user',content:[
          {type:'image_url',image_url:{url:'data:image/jpeg;base64,'+base64}},
          {type:'text',text:'Проанализируй этот лист. Найди ТЕХНИЧЕСКИЕ несоответствия стандартам IEC, IEEE, ISO. Игнорируй оформление.'}
        ]}
      ],
    }),
  });
  if (!resp.ok) { const e=await resp.text(); throw new Error('GPT '+resp.status+': '+e.slice(0,200)); }
  const data = await resp.json();
  const text = data.choices?.[0]?.message?.content||'[]';
  return safeParseJson(text);
}

// ══════════ MAIN CHECK ══════════

async function runCheck(pdfFile) {
  const prov = state.config.active;
  const apiKey = getKey(prov);
  if (!apiKey) {
    state.error = 'Добавьте API-ключ для '+PROVIDERS[prov].name+' в настройках';
    render(); return;
  }

  state.checking=true; state.progress=0; state.error=''; state.status='Подготовка…';
  state.pageStatuses={}; state.comments=[]; state.showComments=false; state.activeComment=null;
  render();

  try {
    state.status='Чтение справочных файлов…'; render();
    const refCtx = await readRefFiles();
    const sysPrompt = SYSTEM_PROMPT + refCtx;

    if (prov === 'gemini') {
      // ── GEMINI: send entire PDF natively ──
      state.status='Отправка PDF целиком в Gemini…'; state.progress=20; render();

      const results = await callGeminiNativePdf(pdfFile, sysPrompt, apiKey);
      state.progress=90; render();

      let id=1;
      const all=[];
      for (const r of (Array.isArray(results)?results:[])) {
        all.push({
          id:id++,
          page: Math.max(1, Math.min(state.totalPages, parseInt(r.page)||1)),
          x:Math.max(5,Math.min(95,Number(r.x)||50)),
          y:Math.max(5,Math.min(95,Number(r.y)||50)),
          severity:['error','warning','info'].includes(r.severity)?r.severity:'info',
          title:r.title||'Замечание',
          text:r.text||'',
          status:'pending', userReply:'',
          provider:'gemini',
        });
      }
      state.comments=all;

    } else {
      // ── CLAUDE / GPT: page by page with parallelism ──
      const callFn = prov==='claude' ? callClaudePage : callGPTPage;

      // Pre-render all pages
      state.status='Рендеринг страниц…'; render();
      const pages=[];
      for(let p=1;p<=state.totalPages;p++){
        pages.push({page:p, b64: await pageToBase64(state.pdfDoc,p)});
      }
      state.progress=10; render();

      const CONCURRENCY = Math.min(3, state.totalPages);
      const allResults = new Array(state.totalPages);
      let completed=0;
      const queue=[...pages];
      const running=new Set();

      await new Promise(resolve=>{
        function next(){
          if(!queue.length && !running.size){resolve();return;}
          while(running.size<CONCURRENCY && queue.length){
            const task=queue.shift();
            const idx=task.page-1;
            state.pageStatuses[task.page]={status:'analyzing',agent:prov};
            render();
            const p=callFn(task.b64, sysPrompt, apiKey).then(res=>{
              allResults[idx]=res;
              state.pageStatuses[task.page]={status:'done',count:(res||[]).length,agent:prov};
            }).catch(err=>{
              console.error('Page '+task.page+':',err);
              allResults[idx]=[];
              state.pageStatuses[task.page]={status:'error',agent:prov};
            }).finally(()=>{
              completed++;
              state.progress=10+(completed/state.totalPages)*90;
              state.status='Лист '+completed+'/'+state.totalPages+' готово';
              running.delete(p);
              render();
              next();
            });
            running.add(p);
          }
        }
        next();
      });

      let id=1;
      const all=[];
      for(let i=0;i<allResults.length;i++){
        for(const r of (allResults[i]||[])){
          all.push({
            id:id++, page:i+1,
            x:Math.max(5,Math.min(95,Number(r.x)||50)),
            y:Math.max(5,Math.min(95,Number(r.y)||50)),
            severity:['error','warning','info'].includes(r.severity)?r.severity:'info',
            title:r.title||'Замечание', text:r.text||'',
            status:'pending', userReply:'', provider:prov,
          });
        }
      }
      state.comments=all;
    }

    state.showComments=true;
    state.progress=100;
  } catch(err) {
    console.error(err);
    state.error=err.message||'Ошибка';
  }
  state.checking=false; state.status=''; state.pageStatuses={};
  render();
}

// Store the original uploaded File for Gemini native PDF
let originalPdfFile = null;
let renderTaskRef = null;

function renderPdfPage(canvas, doc, num, zoom) {
  if (!doc||!canvas) return;
  if (renderTaskRef) try{renderTaskRef.cancel()}catch(e){}
  doc.getPage(num).then(pg=>{
    const s=(zoom/100)*2;
    const vp=pg.getViewport({scale:s});
    canvas.width=vp.width; canvas.height=vp.height;
    canvas.style.width=(vp.width/2)+'px'; canvas.style.height=(vp.height/2)+'px';
    renderTaskRef=pg.render({canvasContext:canvas.getContext('2d'),viewport:vp});
  });
}

  h += '</div>';
  h += '<div class="modal-foot"><button class="btn" onclick="closeSettings()">Закрыть</button></div>';
  h += '</div></div>';
  return h;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ══════════ ACTIONS ══════════

function pickMainFile(){ document.getElementById('mainFileInput').click(); }
function pickRefFiles(){ document.getElementById('refFileInput').click(); }

async function loadMainFile(input) {
  const f = input.files?.[0];
  if(!f) return;
  state.loading=true; state.pdfName=f.name; render();
  try {
    originalPdfFile = f;
    const buf = await f.arrayBuffer();
    const doc = await pdfjsLib.getDocument({data:buf}).promise;
    state.pdfDoc=doc; state.totalPages=doc.numPages; state.page=1;
    state.showComments=false; state.comments=[]; state.activeComment=null; state.error='';
  } catch(e){ state.error='Не удалось открыть PDF'; console.error(e); }
  state.loading=false;
  input.value='';
  render();
}

function addRefFiles(input) {
  state.refFiles = [...state.refFiles, ...Array.from(input.files||[])];
  input.value='';
  render();
}
function removeRef(i){ state.refFiles=state.refFiles.filter((_,j)=>j!==i); render(); }
function toggleSidebar(){ state.sidebarOpen = state.sidebarOpen===false?true:false; render(); }

function goPage(p){ state.page=p; state.activeComment=null; render(); }
function clickPin(id){ state.activeComment = state.activeComment===id?null:id; render(); }
function clickCard(id){ state.activeComment = state.activeComment===id?null:id; render(); }

function acceptComment(id){ state.comments=state.comments.map(c=>c.id===id?{...c,status:'accepted'}:c); state.activeComment=null; render(); }
function rejectComment(id){
  const comment = state.comments.find(c=>c.id===id);
  if(!comment) return;
  if(!comment._showReply) {
    state.comments = state.comments.map(c=>c.id===id?{...c,_showReply:true}:c);
    render();
    return;
  }
  const reply = prompt('Опишите, почему вы не согласны:');
  if(reply!==null) {
    state.comments=state.comments.map(c=>c.id===id?{...c,status:'rejected',userReply:reply}:c);
    state.activeComment=null;
    render();
  }
}

function startCheck(){ if(originalPdfFile) runCheck(originalPdfFile); }
function resetCheck(){ state.showComments=false; state.comments=[]; state.activeComment=null; state.error=''; render(); }
function clearError(){ state.error=''; render(); }

function openSettings(){ state.showSettings=true; render(); }
function closeSettings(){ state.showSettings=false; render(); }
function selectProvider(id){ state.config.active=id; render(); }
function addKey(prov){
  if(!state.config.keys[prov]) state.config.keys[prov]=[];
  state.config.keys[prov].push({label:'Ключ '+(state.config.keys[prov].length+1),key:'',active:true});
  render();
}
function toggleKey(prov,i){ state.config.keys[prov][i].active=!state.config.keys[prov][i].active; render(); }
function updateKey(prov,i,field,val){ state.config.keys[prov][i][field]=val; }
function removeKey(prov,i){ state.config.keys[prov]=state.config.keys[prov].filter((_,j)=>j!==i); render(); }

// ══════════ WHEEL ZOOM ══════════
document.addEventListener('wheel', function(e){
  if(!state.pdfDoc) return;
  const viewer = document.getElementById('viewerScroll');
  if(!viewer||!viewer.contains(e.target)) return;
  e.preventDefault();
  state.zoom = Math.max(25, Math.min(400, state.zoom + (e.deltaY>0?-8:8)));
  render();
}, {passive:false});

// ══════════ DRAG & DROP ══════════
document.addEventListener('dragover', e=>e.preventDefault());
document.addEventListener('drop', async e=>{
  e.preventDefault();
  const f = e.dataTransfer.files?.[0];
  if(f&&f.type==='application/pdf'){
    state.loading=true; state.pdfName=f.name; render();
    try {
      originalPdfFile = f;
      const buf = await f.arrayBuffer();
      const doc = await pdfjsLib.getDocument({data:buf}).promise;
      state.pdfDoc=doc; state.totalPages=doc.numPages; state.page=1;
      state.showComments=false; state.comments=[]; state.activeComment=null; state.error='';
    } catch(e){ state.error='Не удалось открыть PDF'; }
    state.loading=false; render();
  }
});

// ══════════ INIT ══════════
render();
</script>
</body>
</html>
